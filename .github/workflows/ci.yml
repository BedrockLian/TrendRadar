name: TrendRadar CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.3
      - uses: astral-sh/setup-uv@f94ec6bedd8674c4426838e6b50417d36b6ab231  # v5
        with:
          python-version: "3.12"
      - name: Ruff lint
        run: ruff check trendradar/
      - name: Security scan (bandit)
        run: |
          pip install bandit
          bandit -r trendradar/scripts/ hermes-scripts/ trendradar/skills/ -s B101,B104  # skip assert, bind_all
      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy trendradar/scripts/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    needs: lint-security
    strategy:
      matrix:
        python: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.3
      - uses: astral-sh/setup-uv@f94ec6bedd8674c4426838e6b50417d36b6ab231  # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python }}-${{ hashFiles('trendradar/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python }}-
      - name: Install deps
        run: pip install -r trendradar/requirements-dev.txt
      - name: Smoke tests + coverage
        run: |
          cd trendradar
          PYTHONPATH=$PWD python -m pytest tests/ -x -q --cov=trendradar            --ignore=tests/test_pipeline_e2e_real.py            -k "not integration" || exit 1

  check-references:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.3
      - name: Check reference consistency
        run: |
          cd trendradar
          python3 -c "
import hashlib
from pathlib import Path
root = Path('references')
mismatches = []
for skill_refs in Path('skills').glob('*/references'):
    for f in skill_refs.glob('*.md'):
        root_f = root / f.name
        if root_f.exists():
            h1 = hashlib.md5(root_f.read_bytes()).hexdigest()
            h2 = hashlib.md5(f.read_bytes()).hexdigest()
            if h1 != h2:
                mismatches.append(f'MISMATCH: {root_f} != {f}')
if mismatches:
    print('\n'.join(mismatches))
    exit(1)
print('All references consistent')
"
