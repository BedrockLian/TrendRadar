name: TrendRadar CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.3
      - uses: astral-sh/setup-uv@f94ec6bedd8674c4426838e6b50417d36b6ab231  # v5
        with:
          python-version: "3.12"
      - name: Ruff lint
        run: ruff check trendradar/
      - name: Security scan (bandit)
        run: |
          pip install bandit
          bandit -r trendradar/scripts/ -s B101,B104  # skip assert, bind_all
      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy trendradar/scripts/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    needs: lint-security
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.3
      - uses: astral-sh/setup-uv@f94ec6bedd8674c4426838e6b50417d36b6ab231  # v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install -r trendradar/requirements.txt
          pip install pytest feedparser aiohttp pyyaml pyahocorasick
      - name: Smoke tests (required)
        run: |
          cd trendradar
          PYTHONPATH=$PWD python -m pytest tests/ -x -q             --ignore=tests/test_pipeline_e2e_real.py             -k "not integration" || exit 1
      - name: Full tests
        run: |
          cd trendradar
          PYTHONPATH=$PWD python -m pytest tests/ -v --tb=short

  check-references:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check reference consistency
        run: |
          cd trendradar
          python3 -c "
import hashlib
from pathlib import Path
root = Path('references')
mismatches = []
for skill_refs in root.glob('skills/*/references'):
    for f in skill_refs.glob('*.md'):
        root_f = root / f.name
        if root_f.exists():
            h1 = hashlib.md5(root_f.read_bytes()).hexdigest()
            h2 = hashlib.md5(f.read_bytes()).hexdigest()
            if h1 != h2:
                mismatches.append(f'MISMATCH: {root_f} != {f}')
if mismatches:
    print('\n'.join(mismatches))
    exit(1)
print('All references consistent')
" || echo "WARNING: Reference drift detected"
