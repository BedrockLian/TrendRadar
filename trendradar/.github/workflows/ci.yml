name: TrendRadar CI

on:
  push:
    branches: [main]
    paths:
      - 'trendradar/**'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev,optimize]"

      - name: Lint with ruff
        run: ruff check trendradar/

      - name: Smoke tests
        run: pytest trendradar/tests/ -m smoke -v

      - name: Full tests (allow failures for slow)
        run: pytest trendradar/tests/ -v --timeout 30
        continue-on-error: true
