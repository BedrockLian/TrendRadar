# AI 翻译配置
# ai_translate.py 在启动时读取此文件构建语言分类 frozenset。
# 匹配规则：kw in source_platform.lower() — 子串匹配，不区分大小写。
# 因此用短关键字（如 bbc）即可覆盖所有同源变体（bbc 商务, bbc 科技, bbc 商务+bbc 科技）。

translate:
  enabled: true
  target_language: zh-CN

  # 英文源关键字（匹配 source_platform 的子串）
  english:
    - bbc
    - reuters
    - 路透社
    - nytimes
    - 纽约时报
    - guardian
    - 卫报
    - techcrunch
    - ars technica
    - the verge
    - pc gamer
    - nintendo everything
    - eurogamer
    - video games chronicle
    - rock paper shotgun
    - gamesindustry
    - aftermath
    - automaton
    - npr
    - koreaherald
    - nikkei
    - 日经亚洲
    - japan times
    - inside games
    - scmp
    - 南华早报

  # 日文源关键字
  japanese:
    - nhk
    - 4gamer
