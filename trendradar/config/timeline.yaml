# 趋势雷达时间线配置
# 定义各时段的行为
# filter: keyword | ai
# dedup: 是否去重

slots:
  morning:
    time: "09:00"
    display: "早报"
    filter: keyword
    dedup: false

  noon:
    time: "12:00"
    display: "午报"
    filter: keyword
    dedup: false

  evening:
    time: "21:00"
    display: "晚报"
    dedup: true
    # filter: ai  ← 已移除：无下游消费，晚间等于 keyword 筛选
